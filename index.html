    <title>SmartPantry - ניהול חשבוניות ומלאי AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">

<body class="bg-slate-50 text-gray-900">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import React, { useState, useEffect, useMemo, useRef } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import * as LucideIcons from "https://esm.sh/lucide-react@0.344.0";

        const { 
            Camera, Receipt, Package, Minus, Plus, Trash2, Edit2, 
            Upload, LayoutDashboard, History, Download, Filter,

        // --- Firebase & AI Setup ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pantry-ai-prod';
        
        // ה-API Key שלך מהתמונה
        const apiKey = "AIzaSyDbGtzd4_Q6Vd346hh84A81ugtHGaWHHYo"; 

        // Helper for Exponential Backoff
        async function fetchWithRetry(url, options, maxRetries = 5) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status === 429) {
                        await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                        continue;
                    }
                    throw new Error(`Status: ${response.status}`);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState({});
            const [receipts, setReceipts] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [scanStatus, setScanStatus] = useState("");
            
            // Filtering State
            const [filterMonth, setFilterMonth] = useState('all');
            const [filterCategory, setFilterCategory] = useState('all');
            const [editingReceipt, setEditingReceipt] = useState(null);

            const fileInputRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'pantryData', 'main');
                return onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setInventory(data.inventory || {});
                        setReceipts(data.receipts || []);
                    }
                });
            }, [user]);

            const saveToCloud = async (newData) => {
                if (!user) return;
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'pantryData', 'main');
                await setDoc(userDocRef, newData, { merge: true });
            };

            // --- AI Analysis ---
            const analyzeReceipt = async (base64) => {
                setIsScanning(true);
                setScanStatus("Gemini מנתח את החשבונית...");
                
                const prompt = `Analyze this receipt. The receipt is in Hebrew. Return ONLY a JSON object: 
                { "store": string, "date": "YYYY-MM-DD", "total": number, 
                  "items": [{ "name": string, "quantity": number, "price": number, "category": "מזון" | "נקיון" | "פירות וירקות" | "אחר" }] }`;

                try {
                    const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }]
                        })
                    });

                    const text = result.candidates[0].content.parts[0].text;
                    const jsonString = text.match(/\{[\s\S]*\}/)[0];
                    const data = JSON.parse(jsonString);

                    const newReceipt = { ...data, id: Date.now().toString() };
                    const updatedReceipts = [newReceipt, ...receipts];
                    
                    const updatedInventory = { ...inventory };
                    data.items.forEach(item => {
                        const existing = updatedInventory[item.name] || { quantity: 0, category: item.category };
                        updatedInventory[item.name] = {
                            ...existing,
                            quantity: existing.quantity + (item.quantity || 1),
                            lastPrice: item.price,
                            category: item.category
                        };
                    });

                    setReceipts(updatedReceipts);
                    setInventory(updatedInventory);
                    await saveToCloud({ receipts: updatedReceipts, inventory: updatedInventory });
                    
                    setScanStatus("החשבונית נקלטה בהצלחה!");
                    setTimeout(() => { setIsScanning(false); setActiveTab('receipts'); }, 1500);
                } catch (err) {
                    console.error(err);
                    setScanStatus("שגיאה בניתוח. וודא שהצילום ברור.");
                    setTimeout(() => setIsScanning(false), 3000);
                }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => analyzeReceipt(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            };

            // --- Computed Data ---
            const filteredReceipts = useMemo(() => {
                return receipts.filter(r => {
                    const m = filterMonth === 'all' || r.date.startsWith(filterMonth);
                    const c = filterCategory === 'all' || r.items.some(i => i.category === filterCategory);
                    return m && c;

            const months = useMemo(() => [...new Set(receipts.map(r => r.date.substring(0, 7)))].sort().reverse(), [receipts]);

                    React.createElement('div', { className: "flex items-center gap-3" },
                        React.createElement('div', { className: "hidden md:block text-[10px] bg-emerald-50 text-emerald-600 font-bold px-3 py-1 rounded-full border border-emerald-100" }, "מחובר לענן"),
                        React.createElement('div', { className: "w-10 h-10 rounded-full bg-blue-50 border-2 border-white shadow-sm flex items-center justify-center text-blue-600 font-bold" }, user?.uid?.substring(0,2).toUpperCase())
                    )
                ),

                React.createElement('main', { className: "max-w-4xl mx-auto p-4 md:p-8" },
                    
                    // Dashboard View
                    activeTab === 'dashboard' && React.createElement('div', { className: "space-y-6 animate-in fade-in" },
                        React.createElement('div', { className: "bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-800 rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden" },
                            React.createElement('div', { className: "relative z-10" },
                                React.createElement('p', { className: "text-blue-100 font-bold text-sm uppercase tracking-wider" }, "סה\"כ הוצאות"),

                                )) : React.createElement('p', { className: "text-center py-8 text-slate-300 font-bold" }, "אין נתונים להצגה")
                            ),
                            React.createElement('div', { className: "bg-white p-6 rounded-[2rem] border shadow-sm" },

                                Object.entries(inventory).slice(0, 3).map(([name, data]) => React.createElement('div', { key: name, className: "flex justify-between py-4 border-b last:border-0" },
                                    React.createElement('p', { className: "font-bold text-sm" }, name),
                                    React.createElement('p', { className: "font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg" }, data.quantity)

                    ),

                    activeTab === 'inventory' && React.createElement('div', { className: "space-y-6 animate-in slide-in-from-bottom-4" },

                            React.createElement('h2', { className: "text-3xl font-black" }, "ניהול המזווה"),

                        React.createElement('div', { className: "grid grid-cols-1 gap-3" },
                            Object.entries(inventory).map(([name, data]) => React.createElement('div', { key: name, className: "bg-white p-6 rounded-[2rem] border flex justify-between items-center group shadow-sm hover:border-blue-200 transition-colors" },
                                React.createElement('div', null,

                                    React.createElement('span', { className: "text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded-md font-bold uppercase tracking-wide" }, data.category || "אחר")

                                React.createElement('div', { className: "flex items-center gap-4" },
                                    React.createElement('button', { onClick: async () => {
                                        const n = {...inventory, [name]: {...data, quantity: Math.max(0, data.quantity-1)}};
                                        setInventory(n); await saveToCloud({inventory: n});

                                    React.createElement('span', { className: "text-2xl font-black w-8 text-center text-slate-700" }, data.quantity),

                        ),
                        
                        // Filters
                        React.createElement('div', { className: "bg-white p-5 rounded-[2rem] border flex flex-wrap gap-4 shadow-sm" },
                            React.createElement('div', { className: "flex-1 min-w-[160px] bg-slate-50 p-3.5 rounded-2xl flex items-center gap-2 border border-slate-100 focus-within:border-blue-400 transition-colors" },
                                React.createElement(Calendar, { size: 18, className: "text-slate-400" }),

                                    months.map(m => React.createElement('option', { key: m, value: m }, m))
                                )
                            ),

                                    ["מזון", "נקיון", "פירות וירקות", "אחר"].map(c => React.createElement('option', { key: c, value: c }, c))

                                        React.createElement('p', { className: "text-2xl font-black text-blue-600" }, `₪${r.total}`),
                                        React.createElement('div', { className: "flex gap-3 mt-3 opacity-0 group-hover:opacity-100 transition-opacity" },

                                        )

                                ),

                                        React.createElement('span', { className: "text-[11px] text-slate-700 font-bold" }, item.name),
                                        React.createElement('span', { className: "text-[10px] text-blue-500 font-black" }, `x${item.quantity}`)
                                    ))
                                )

                                React.createElement('p', { className: "text-slate-400 font-bold" }, "אין חשבוניות התואמות לסינון")
                            )

                    ),

                    // Scanner View
                    activeTab === 'scanner' && React.createElement('div', { className: "max-w-md mx-auto py-12" },
                        isScanning ? React.createElement('div', { className: "bg-white p-16 rounded-[4rem] border-2 border-blue-100 shadow-2xl text-center space-y-8" },
                            React.createElement('div', { className: "loader mx-auto" }),
                            React.createElement('div', { className: "space-y-2" },
                                React.createElement('h3', { className: "text-2xl font-black text-blue-600 animate-pulse" }, scanStatus),
