<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPantry Cloud - ניהול מלאי חכם</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Heebo for Hebrew -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; }
        .glass-nav {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-900">
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import React, { useState, useEffect, useMemo, useRef } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";
        import * as LucideIcons from "https://esm.sh/lucide-react@0.344.0";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCcPBoY1804EzP1VRcMmb-Tb6EqkD5_4z8",
            authDomain: "smartpantry-1ff7c.firebaseapp.com",
            projectId: "smartpantry-1ff7c",
            storageBucket: "smartpantry-1ff7c.firebasestorage.app",
            messagingSenderId: "894209068764",
            appId: "1:894209068764:web:1c5d402c50ff110744ee19",
            measurementId: "G-9FKNYB6852"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smart-pantry-prod";

        const { 
            Camera, Receipt, Package, Minus, Plus, Trash2, Edit2, 
            Upload, Cloud, RefreshCw, LayoutDashboard, Layers, 
            Wallet, History, LogOut, CheckCircle2, MoreVertical, PieChart, BarChart3
        } = LucideIcons;

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [receiptSubTab, setReceiptSubTab] = useState('history');
            const [showProfileMenu, setShowProfileMenu] = useState(false);
            const [inventory, setInventory] = useState({});
            const [receipts, setReceipts] = useState([]);
            const [categories, setCategories] = useState(["מזון", "נקיון", "כלי בית", "ירקות ופירות", "שונות"]);
            const [isSyncing, setIsSyncing] = useState(false);
            const [editingItemKey, setEditingItemKey] = useState(null);
            const [isAddingItem, setIsAddingItem] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (e) { console.error(e); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                setIsSyncing(true);
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'pantryData', 'main');
                return onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.inventory) setInventory(data.inventory);
                        if (data.receipts) setReceipts(data.receipts);
                        if (data.categories) setCategories(data.categories);
                    }
                    setIsSyncing(false);
                });
            }, [user]);

            const saveToCloud = async (newData) => {
                if (!user) return;
                setIsSyncing(true);
                try {
                    const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'pantryData', 'main');
                    await setDoc(userDocRef, newData, { merge: true });
                } finally { setIsSyncing(false); }
            };

            const stats = useMemo(() => {
                let total = 0;
                const catTotals = {};
                receipts.forEach(r => {
                    total += r.total;
                    r.items?.forEach(i => {
                        catTotals[i.category] = (catTotals[i.category] || 0) + i.price;
                    });
                });
                return { total, catTotals };
            }, [receipts]);

            return React.createElement('div', { className: "min-h-screen pb-40" },
                // Header
                React.createElement('header', { className: "bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b h-20 px-6 flex items-center justify-between" },
                    React.createElement('div', { className: "flex items-center gap-3" },
                        React.createElement('div', { className: "bg-blue-600 p-2 rounded-xl text-white shadow-lg" }, React.createElement(Package, { size: 24 })),
                        React.createElement('h1', { className: "font-black text-2xl" }, "Smart", React.createElement('span', { className: "text-blue-600" }, "Pantry"))
                    ),
                    React.createElement('div', { className: "flex items-center gap-4" },
                        React.createElement('div', { className: "hidden sm:flex items-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-600 rounded-xl text-xs font-bold border" },
                            React.createElement('div', { className: `w-2 h-2 rounded-full ${isSyncing ? 'bg-orange-400 animate-pulse' : 'bg-emerald-500'}` }),
                            isSyncing ? "מעדכן..." : "מסונכרן"
                        ),
                        React.createElement('button', { 
                            onClick: () => setShowProfileMenu(!showProfileMenu),
                            className: "w-12 h-12 rounded-xl bg-blue-50 border-2 border-white shadow-lg overflow-hidden"
                        }, React.createElement('img', { src: `https://api.dicebear.com/7.x/avataaars/svg?seed=${user?.uid}` }))
                    )
                ),

                // Main Content
                React.createElement('main', { className: "max-w-5xl mx-auto p-6" },
                    activeTab === 'dashboard' && React.createElement('div', { className: "space-y-6" },
                        React.createElement('div', { className: "bg-gradient-to-br from-blue-700 to-indigo-900 p-8 rounded-[2.5rem] text-white shadow-2xl" },
                            React.createElement('p', { className: "text-blue-200 text-sm font-bold" }, "הוצאה כוללת"),
                            React.createElement('h3', { className: "text-4xl font-black mt-1" }, `₪${stats.total.toLocaleString()}`),
                            React.createElement('div', { className: "mt-4 flex items-center gap-2 text-xs opacity-70" }, React.createElement(CheckCircle2, { size: 14 }), "כל הנתונים שמורים ב-Cloud")
                        ),
                        React.createElement('div', { className: "bg-white p-6 rounded-[2.5rem] shadow-sm border" },
                            React.createElement('h3', { className: "font-black text-xl mb-4 flex items-center gap-2" }, React.createElement(History, { size: 20, className: "text-blue-600" }), "פעילות אחרונה"),
                            receipts.slice(0, 3).map(r => React.createElement('div', { key: r.id, className: "flex justify-between py-3 border-b last:border-0" },
                                React.createElement('div', null, React.createElement('p', { className: "font-bold" }, r.store), React.createElement('p', { className: "text-xs text-gray-400" }, r.date)),
                                React.createElement('p', { className: "font-black" }, `₪${r.total}`)
                            ))
                        )
                    ),

                    activeTab === 'inventory' && React.createElement('div', { className: "space-y-6" },
                        React.createElement('div', { className: "flex justify-between items-center" },
                            React.createElement('h2', { className: "text-3xl font-black" }, "המזווה שלי"),
                            React.createElement('button', { onClick: () => setIsAddingItem(true), className: "bg-blue-600 text-white px-6 py-3 rounded-2xl font-black flex items-center gap-2" }, React.createElement(Plus, { size: 20 }), "הוסף מוצר")
                        ),
                        React.createElement('div', { className: "bg-white rounded-[2.5rem] shadow-sm border overflow-hidden" },
                            React.createElement('table', { className: "w-full text-right" },
                                React.createElement('thead', { className: "bg-gray-50 text-[11px] font-black text-gray-400 uppercase tracking-widest border-b" },
                                    React.createElement('tr', null, 
                                        React.createElement('th', { className: "p-6" }, "מוצר"),
                                        React.createElement('th', { className: "p-6" }, "כמות"),
                                        React.createElement('th', { className: "p-6" }, "מחיר")
                                    )
                                ),
                                React.createElement('tbody', { className: "divide-y" },
                                    Object.entries(inventory).map(([name, data]) => React.createElement('tr', { key: name, className: "hover:bg-blue-50/20" },
                                        React.createElement('td', { className: "p-6 font-bold" }, name),
                                        React.createElement('td', { className: "p-6" }, React.createElement('div', { className: "flex items-center gap-3" },
                                            React.createElement('button', { onClick: () => {
                                                const n = {...inventory, [name]: {...data, quantity: Math.max(0, data.quantity-1)}};
                                                setInventory(n); saveToCloud({inventory: n});
                                            }, className: "w-8 h-8 border rounded-lg flex items-center justify-center" }, React.createElement(Minus, { size: 14 })),
                                            React.createElement('span', { className: "font-black" }, data.quantity),
                                            React.createElement('button', { onClick: () => {
                                                const n = {...inventory, [name]: {...data, quantity: data.quantity+1}};
                                                setInventory(n); saveToCloud({inventory: n});
                                            }, className: "w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center" }, React.createElement(Plus, { size: 14 }))
                                        )),
                                        React.createElement('td', { className: "p-6 font-black" }, `₪${data.priceHistory?.slice(-1)[0]?.price || 0}`)
                                    ))
                                )
                            )
                        )
                    ),

                    activeTab === 'scanner' && React.createElement('div', { className: "max-w-md mx-auto py-12 space-y-8" },
                        React.createElement('div', { className: "text-center space-y-2" },
                            React.createElement('h2', { className: "text-3xl font-black" }, "סורק חכם"),
                            React.createElement('p', { className: "text-gray-400 font-bold" }, "סרוק חשבונית לעדכון המלאי")
                        ),
                        React.createElement('div', { className: "bg-white border-4 border-dashed rounded-[3.5rem] p-16 text-center cursor-pointer hover:bg-blue-50 transition-all group" },
                            React.createElement('div', { className: "w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl" }, React.createElement(Camera, { size: 48 })),
                            React.createElement('h3', { className: "text-xl font-black" }, "פתח מצלמה")
                        ),
                        React.createElement('button', { onClick: () => fileInputRef.current.click(), className: "w-full bg-white border p-6 rounded-[2rem] flex items-center justify-center gap-3 font-black text-gray-600" },
                            React.createElement(Upload, { size: 24, className: "text-blue-600" }), "העלאת קובץ מהגלריה"
                        ),
                        React.createElement('input', { type: "file", ref: fileInputRef, className: "hidden", accept: "image/*" })
                    )
                ),

                // Floating Nav
                React.createElement('div', { className: "fixed bottom-10 left-1/2 -translate-x-1/2 z-50 w-full max-w-md px-6" },
                    React.createElement('nav', { className: "glass-nav px-8 py-5 rounded-[3rem] flex justify-between items-center shadow-2xl border border-white/10" },
                        [
                            { id: 'dashboard', icon: LayoutDashboard, label: 'בית' },
                            { id: 'inventory', icon: Package, label: 'מלאי' },
                            { id: 'scanner', icon: Camera, label: 'סורק', center: true },
                            { id: 'receipts', icon: Receipt, label: 'דוחות' }
                        ].map(item => React.createElement('button', { 
                            key: item.id, 
                            onClick: () => setActiveTab(item.id),
                            className: `flex flex-col items-center gap-1 transition-all ${item.center ? '-mt-20' : (activeTab === item.id ? 'text-blue-400 scale-110' : 'text-gray-500')}`
                        }, 
                            item.center ? React.createElement('div', { className: "bg-blue-600 p-5 rounded-full text-white shadow-2xl ring-8 ring-slate-50" }, React.createElement(item.icon, { size: 32 }))
                            : React.createElement(React.Fragment, null, React.createElement(item.icon, { size: 24 }), React.createElement('span', { className: "text-[10px] font-black" }, item.label))
                        ))
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
